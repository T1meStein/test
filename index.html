<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu avec cartes</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .menu-container {
    display: flex;
    gap: 30px; /* espace entre les cartes */
  }

  .menu-item {
    background-color: white;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    padding: 20px;
    width: 200px;
    text-align: center;
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .menu-item:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }

  .menu-item img {
    width: 100%;
    height: auto;
    border-radius: 8px;
    margin-bottom: 15px;
  }

  .menu-item button {
    padding: 10px 15px;
    font-size: 16px;
    background-color: #3498db;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    width: 100%;
    transition: background-color 0.3s;
  }

  .menu-item button:hover {
    background-color: #2980b9;
  }

  .menu-item p {
    margin: 10px 0;
    font-size: 14px;
    color: #333;
  }

</style>
</head>
<body>

<div class="menu-container">
  <div class="menu-item">
    <img src="https://via.placeholder.com/200x120" alt="Aperçu 1">
    <p>Description du bouton 1</p>
    <button>Bouton 1</button>
  </div>
  <div class="menu-item">
    <img src="https://via.placeholder.com/200x120" alt="Aperçu 2">
    <p>Description du bouton 2</p>
    <button>Bouton 2</button>
  </div>
  <div class="menu-item">
    <img src="https://via.placeholder.com/200x120" alt="Aperçu 3">
    <p>Description du bouton 3</p>
    <button>Bouton 3</button>
  </div>
</div>

</body>
</html>
