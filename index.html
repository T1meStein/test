<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu cliquable</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .menu-container {
    display: flex;
    gap: 30px; /* espace entre les boutons */
  }

  /* Bouton en tant que lien */
  .menu-button {
    display: flex;
    flex-direction: column; /* texte au dessus de l'image */
    align-items: center;
    text-decoration: none; /* supprimer le souligné du lien */
    background-color: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: transform 0.3s, box-shadow 0.3s;
    width: 200px;
  }

  .menu-button:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }

  /* Texte du bouton */
  .menu-button span {
    font-size: 16px;
    color: #333;
    margin-bottom: 10px;
    text-align: center;
  }

  /* Image du bouton */
  .menu-button img {
    width: 100%;
    height: auto;
    border-radius: 8px;
  }
</style>
</head>
<body>

<div class="menu-container">
  <a href="page1.html" class="menu-button">
    <span>L'Histoire de Minecraft</span>
    <img src="image_accueil_histoire.jpg" alt="Aperçu 1">
  </a>
  <a href="page2.html" class="menu-button">
    <span>La Communauté</span>
    <img src="image_accueil_communaute.webp" alt="Aperçu 2">
  </a>
  <a href="page3.html" class="menu-button">
    <span>Le Quiz sur Minecraft</span>
    <img src="image_quiz.jpg" alt="Aperçu 3">
  </a>
</div>

</body>
</html>
